name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths-ignore:
      - '*.md'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    name: Test Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Docker Login
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: build zabbix60-agent2
      uses: home-assistant/builder@2026.02.1
      with:
        args: |
          --test \
          --amd64 \
          --aarch64 \
          --no-latest \
          --no-cache \
          --docker-hub ghcr.io/${{ github.repository_owner }} \
          --image image-{arch}-zabbix60-agent2 \
          --target zabbix60-agent2
    
    - name: build zabbix70-agent2
      uses: home-assistant/builder@2026.02.1
      with:
        args: |
          --test \
          --amd64 \
          --aarch64 \
          --no-latest \
          --no-cache \
          --docker-hub ghcr.io/${{ github.repository_owner }} \
          --image image-{arch}-zabbix60-agent2 \
          --target zabbix70-agent2
