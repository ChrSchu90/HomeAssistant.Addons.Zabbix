name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths-ignore:
      - '*.md'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    name: Test Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: build zabbix60-agent2
      uses: home-assistant/builder@2024.03.5
      with:
        args: |
          --test \
          --amd64 \
          --aarch64 \
          --no-latest \
          --no-cache \
          --docker-hub ${{ secrets.DOCKERHUB_USERNAME }} \
          --image image-{arch}-zabbix60-agent2 \
          --target zabbix60-agent2
    
    - name: build zabbix70-agent2
      uses: home-assistant/builder@2024.03.5
      with:
        args: |
          --test \
          --amd64 \
          --aarch64 \
          --no-latest \
          --no-cache \
          --docker-hub ${{ secrets.DOCKERHUB_USERNAME }} \
          --image image-{arch}-zabbix70-agent2 \
          --target zabbix70-agent2
