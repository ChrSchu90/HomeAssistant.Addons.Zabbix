name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths-ignore:
      - '*.md'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    name: Test Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: build zabbix-agent2-6.0
      uses: home-assistant/builder@2024.03.5
      with:
        args: |
          --test \
          --release-tag test \
          --no-cache \
          --amd64 \
          --target "zabbix-agent2-6.0" \
          --docker-hub ${{ secrets.DOCKERHUB_USERNAME }}
    
    - name: build zabbix-agent2-7.0
      uses: home-assistant/builder@2024.03.5
      with:
        args: |
          --test \
          --release-tag test \
          --no-cache \
          --amd64 \
          --target "zabbix-agent2-7.0"
          --docker-hub ${{ secrets.DOCKERHUB_USERNAME }}